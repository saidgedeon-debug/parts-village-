<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parts Village - Admin Backoffice</title>
<link rel="stylesheet" href="css/admin.css">
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="login-screen">
    <div class="login-box">
        <div class="login-logo">
            <div class="login-logo-icon">PV</div>
            <div class="login-logo-text">PARTS VILLAGE</div>
            <div class="login-logo-sub">Admin Backoffice</div>
        </div>
        <div class="login-form">
            <div class="login-field">
                <label>Admin Password</label>
                <input type="password" id="login-password" placeholder="Enter admin password" autofocus>
            </div>
            <div id="login-error" class="login-error"></div>
            <button class="login-btn" onclick="PVAdmin.login()">Login to Dashboard</button>
            <div class="login-hint">Sign in with admin credentials</div>
        </div>
    </div>
</div>

<!-- APP CONTENT -->
<div id="app-content" style="display:none;">

    <!-- HEADER -->
    <header class="admin-header">
        <div class="admin-header-inner">
            <a href="../index.html" class="admin-logo">
                <div class="admin-logo-icon">PV</div>
                <div>
                    <div class="admin-logo-text">PARTS VILLAGE</div>
                    <div class="admin-logo-sub">Admin Backoffice</div>
                </div>
            </a>
            <div class="admin-header-actions">
                <span id="admin-user-info" class="admin-user-info"></span>
                <button class="btn-add-new" onclick="PVAdmin.addNewItem()" style="background:linear-gradient(135deg,#4caf50,#2e7d32);color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:0.9em;font-weight:600;cursor:pointer;transition:all 0.3s;">+ Add New</button>
                <button class="btn-export" onclick="PVAdmin.exportToJSON()">Export JSON</button>
                <label class="btn-import">
                    Import JSON
                    <input type="file" accept=".json" onchange="PVAdmin.importFromJSON(this.files[0])" style="display:none;">
                </label>
                <button class="btn-logout" onclick="PVAdmin.logout()">Logout</button>
            </div>
        </div>
    </header>

    <!-- STATS -->
    <div class="admin-stats">
        <div class="admin-stat">
            <div class="admin-stat-number" id="admin-stat-total">0</div>
            <div class="admin-stat-label">Total Items</div>
        </div>
        <div class="admin-stat">
            <div class="admin-stat-number" id="admin-stat-complete">0</div>
            <div class="admin-stat-label">Complete</div>
        </div>
        <div class="admin-stat">
            <div class="admin-stat-number" id="admin-stat-needs-image">0</div>
            <div class="admin-stat-label">Needs Image</div>
        </div>
        <div class="admin-stat">
            <div class="admin-stat-number" id="admin-stat-needs-verify">0</div>
            <div class="admin-stat-label">Needs Verify</div>
        </div>
        <div class="admin-stat">
            <div class="admin-stat-number" id="admin-stat-draft">0</div>
            <div class="admin-stat-label">Draft</div>
        </div>
        <div class="admin-stat">
            <div class="admin-stat-number" id="admin-stat-images">0</div>
            <div class="admin-stat-label">With Images</div>
        </div>
    </div>

    <!-- MISSING DATA WARNING -->
    <div id="missing-data-warning" class="missing-data-warning" style="display:none;"></div>

    <!-- SEARCH & FILTER -->
    <div class="admin-filters">
        <input type="text" id="admin-search" class="admin-search-input" placeholder="Search parts..." oninput="PVAdmin.search(this.value)">
        <select id="admin-status-filter" class="admin-filter-select" onchange="PVAdmin.filterByStatus(this.value)">
            <option value="all">All Status</option>
            <option value="Complete">Complete</option>
            <option value="Needs image">Needs Image</option>
            <option value="Needs verification">Needs Verification</option>
            <option value="Draft">Draft</option>
        </select>
    </div>

    <!-- TABLE -->
    <div class="admin-table-container">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Item Code</th>
                    <th>OEM Number</th>
                    <th>Product Name</th>
                    <th>Brand</th>
                    <th>Category</th>
                    <th>Machines</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="admin-table-body"></tbody>
        </table>
    </div>

</div>

<!-- EDIT MODAL -->
<div id="edit-modal" class="edit-modal-overlay">
    <div class="edit-modal">
        <div class="edit-modal-header">
            <h2>Edit Product</h2>
            <button class="edit-modal-close" onclick="PVAdmin.closeEdit()">&#10005;</button>
        </div>
        <div class="edit-modal-body">
            <!-- TABS -->
            <div class="edit-tabs">
                <button class="tab-btn active" data-tab="basic" onclick="PVAdmin.switchTab('basic')">Basic Info</button>
                <button class="tab-btn" data-tab="machines" onclick="PVAdmin.switchTab('machines')">Machines</button>
                <button class="tab-btn" data-tab="specs" onclick="PVAdmin.switchTab('specs')">Specs &amp; Dimensions</button>
                <button class="tab-btn" data-tab="image" onclick="PVAdmin.switchTab('image')">Image</button>
            </div>

            <!-- TAB: BASIC -->
            <div id="tab-basic" class="tab-content active">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Item Code</label>
                        <input type="text" id="edit-item-code" disabled>
                    </div>
                    <div class="form-group">
                        <label>OEM Part Number</label>
                        <input type="text" id="edit-oem-number">
                    </div>
                    <div class="form-group">
                        <label>Product Name (EN)</label>
                        <input type="text" id="edit-product-name-en">
                    </div>
                    <div class="form-group">
                        <label>Product Name (AR)</label>
                        <input type="text" id="edit-product-name-ar">
                    </div>
                    <div class="form-group">
                        <label>Product Name (FR)</label>
                        <input type="text" id="edit-product-name-fr">
                    </div>
                    <div class="form-group">
                        <label>Product Name (ZH)</label>
                        <input type="text" id="edit-product-name-zh">
                    </div>
                    <div class="form-group">
                        <label>Brand</label>
                        <input type="text" id="edit-brand">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <input type="text" id="edit-category">
                    </div>
                    <div class="form-group">
                        <label>Engine</label>
                        <input type="text" id="edit-engine">
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="edit-status">
                            <option value="Draft">Draft</option>
                            <option value="Needs image">Needs Image</option>
                            <option value="Needs verification">Needs Verification</option>
                            <option value="Complete">Complete</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Verification Status</label>
                        <select id="edit-verification">
                            <option value="Pending">Pending</option>
                            <option value="Verified">Verified</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label>Notes</label>
                        <textarea id="edit-notes" rows="3"></textarea>
                    </div>
                </div>
            </div>

            <!-- TAB: MACHINES -->
            <div id="tab-machines" class="tab-content">
                <div class="form-group">
                    <label>Compatible Machines</label>
                    <div id="edit-machines-container"></div>
                    <button type="button" class="btn-add" onclick="PVAdmin.addMachineField()">+ Add Machine</button>
                </div>
                <div class="form-group">
                    <label>Alternative Part Numbers</label>
                    <div id="edit-alt-numbers-container"></div>
                    <button type="button" class="btn-add" onclick="PVAdmin.addAltNumberField()">+ Add Number</button>
                </div>
            </div>

            <!-- TAB: SPECS -->
            <div id="tab-specs" class="tab-content">
                <div class="form-group">
                    <label>Technical Specifications</label>
                    <div id="edit-tech-specs-container"></div>
                    <button type="button" class="btn-add" onclick="PVAdmin.addSpecField()">+ Add Spec</button>
                </div>
                <div class="form-group">
                    <label>Sizes &amp; Dimensions</label>
                    <div id="edit-dimensions-container"></div>
                    <button type="button" class="btn-add" onclick="PVAdmin.addDimField()">+ Add Dimension</button>
                </div>
            </div>

            <!-- TAB: IMAGE -->
            <div id="tab-image" class="tab-content">
                <div class="form-group">
                    <label>Current Image</label>
                    <div id="edit-image-preview"></div>
                </div>
                <div class="form-group">
                    <label>Upload New Image</label>
                    <input type="file" id="edit-image-upload" accept="image/*" onchange="PVAdmin.handleImageUpload(event)">
                </div>
            </div>
        </div>
        <div class="edit-modal-footer">
            <button class="btn-cancel" onclick="PVAdmin.closeEdit()">Cancel</button>
            <button class="btn-save" id="edit-save-btn" onclick="PVAdmin.saveItem()">Save Changes</button>
        </div>
    </div>
</div>

<!-- TOAST CONTAINER -->
<div id="toast-container" class="toast-container"></div>
