<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="Parts Village - Premium Heavy Equipment Spare Parts Digital Catalog">
<title>Parts Village - Digital Catalog</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/x-icon" href="images/favicon.ico">
<link rel="apple-touch-icon" href="images/icon-192.png">
<meta name="theme-color" content="#c0c0c0">
</head>
<body>

<!-- HEADER -->
<header class="pv-header">
    <div class="pv-header-inner">
        <a href="index.html" class="pv-logo">
            <img src="images/logo-header.png" alt="Parts Village" class="pv-logo-full">
            <img src="images/logo-dark.png" alt="PV" class="pv-logo-compact">
        </a>
        <div class="pv-search-container">
            <span class="pv-search-icon">🔍</span>
            <input type="text" id="search-input" class="pv-search-input" 
                   placeholder="Search part number, code, name, machine model..." autocomplete="off">
            <button class="pv-search-clear" id="search-clear">✕</button>
        </div>
        <a href="suppliers/index.html" class="pv-suppliers-link" title="Suppliers & Inquiries">
            <span class="pv-suppliers-icon">🏭</span>
            <span class="pv-suppliers-text">Suppliers</span>
        </a>
        <a href="clients/index.html" class="pv-clients-link" title="Clients & Quotations">
            <span class="pv-clients-icon">👥</span>
            <span class="pv-clients-text">Clients</span>
        </a>
    </div>
</header>

<!-- FILTERS -->
<div class="pv-filters">
    <select id="filter-brand" class="pv-filter-select">
        <option value="all">All Brands</option>
    </select>
    <select id="filter-category" class="pv-filter-select">
        <option value="all">All Categories</option>
    </select>
    <select id="filter-status" class="pv-filter-select">
        <option value="all">All Status</option>
        <option value="Complete">Complete</option>
        <option value="Needs image">Needs Image</option>
        <option value="Needs verification">Needs Verification</option>
        <option value="Draft">Draft</option>
    </select>
    <select id="filter-machine-brand" class="pv-filter-select">
        <option value="all">All Machine Brands</option>
    </select>
    <label style="display:flex;align-items:center;gap:8px;color:var(--pv-text-secondary);font-size:0.9em;cursor:pointer;">
        <input type="checkbox" id="filter-favorites" style="width:20px;height:20px;cursor:pointer;">
        ⭐ Favorites Only
    </label>
</div>

<!-- CATALOG GRID -->
<div class="pv-catalog" id="catalog-grid">
    <!-- Items rendered by JS -->
</div>

<!-- PRODUCT DETAIL MODAL -->
<div class="pv-modal-overlay" id="modal-overlay">
    <div class="pv-modal" id="detail-modal">
        <button class="pv-modal-close" id="modal-close">✕</button>
        <div id="modal-content">
            <!-- Modal content rendered by JS -->
        </div>
    </div>
</div>

<!-- THEME TOGGLE -->
<button class="theme-toggle" id="theme-toggle" title="Toggle Light/Dark Mode">☀️</button>

<!-- ADMIN LINK -->
<div style="text-align: center; padding: 20px; opacity: 0.3;">
    <a href="admin/index.html" style="color: var(--pv-text-muted); font-size: 0.8em; text-decoration: none;">🔒 Admin Backoffice</a>
</div>

<!-- COST PRICE REQUEST MODAL -->
<div id="cost-price-modal" class="cost-modal-overlay">
    <div class="cost-modal">
        <div class="cost-modal-header">
            <h2>&#128272; Cost Price Access</h2>
            <button class="cost-modal-close" onclick="PVApp.closeCostPriceModal()">&#10005;</button>
        </div>
        <div class="cost-modal-body">
            <!-- Password Screen -->
            <div id="cost-password-screen">
                <p class="cost-hint">Cost prices are protected. Enter the access password to view pricing for this item.</p>
                <div class="cost-field">
                    <label>Access Password</label>
                    <input type="password" id="cost-password-input" placeholder="Enter password" onkeydown="if(event.key==='Enter')PVApp.verifyCostPassword()">
                </div>
                <div id="cost-password-error" class="cost-password-error"></div>
                <button class="btn-cost-unlock" onclick="PVApp.verifyCostPassword()">&#128275; Unlock Cost Prices</button>
            </div>
            <!-- Cost Data Screen (hidden initially) -->
            <div id="cost-data-screen" style="display:none;">
                <div id="cost-data-content"></div>
            </div>
        </div>
    </div>
</div>

<script src="js/supabase-client.js"></script>
